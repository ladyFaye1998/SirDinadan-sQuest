name: Build and Deploy Unity WebGL

on:
  push:
    branches:
      - main
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Inject C# Editor script to force-disable WebGL compression via Unity API
      - name: Inject Compression Override
        run: |
          mkdir -p Assets/Editor
          cat << 'EOF' > Assets/Editor/DisableCompression.cs
          using UnityEditor;
          public class DisableCompression {
              [InitializeOnLoadMethod]
              static void Disable() {
                  PlayerSettings.WebGL.compressionFormat = WebGLCompressionFormat.Disabled;
              }
          }
          EOF

      # Compiles the WebGL build
      - name: Unity WebGL Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          buildName: SirDinadan
          allowDirtyBuild: true

      # Pushes the compiled build to the hosting branch
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build/WebGL/SirDinadan
