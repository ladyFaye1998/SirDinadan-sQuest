name: Build and Deploy Unity WebGL

on:
  push:
    branches:
      - main
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Instantly disable WebGL compression in the project settings
      - name: Disable Compression
        run: sed -i 's/webGLCompressionFormat: .*/webGLCompressionFormat: 0/g' ProjectSettings/ProjectSettings.asset

      # Compiles the WebGL build
      - name: Unity WebGL Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          buildName: SirDinadan
          allowDirtyBuild: true

      # Pushes the compiled build to the hosting branch
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build/WebGL/SirDinadan
